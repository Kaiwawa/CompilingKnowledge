---
- name: Initial Setup and Ping
  hosts: k3s_cluster
  become: yes
  tasks:
    - name: Ping all nodes
      ansible.builtin.ping:

    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: yes
      when: ansible_os_family == "Debian"

    - name: Install basic dependencies
      ansible.builtin.apt:
        name:
          - curl
          - wget
          - git
        state: present
      when: ansible_os_family == "Debian"
